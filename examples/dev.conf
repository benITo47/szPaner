# Development zone - typical coding setup
zone "dev" {
    # Main editor pane - takes up the left side
    pane "editor" {
        command "echo 'Ready for nvim/vim'"
        size 60%
    }

    # Server pane - top right
    pane "server" {
        command "echo 'npm run dev goes here'"
        split "right"
        size 40%
    }

    # Logs pane - bottom right
    pane "logs" {
        command "echo 'tail -f logs/app.log'"
        split "down"
    }
}

# Server monitoring zone - SSH is just a command!
zone "servers" {
    pane "prod" {
        command "ssh user@prod.example.com"
        size 50%
    }

    pane "staging" {
        command "ssh user@staging.example.com"
        split "right"
        size 50%
    }

    pane "local" {
        command "htop"
        split "down"
    }
}
