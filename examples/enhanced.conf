# Enhanced config example with new features

zone "myproject" {
    working_dir "/Users/bartlomiejobrochta/projects/myapp"
    on_start "echo 'Starting myproject zone'"
    on_detach "echo 'Goodbye!'"

    pane "editor" {
        execute "nvim"
        size 60%
    }

    pane "server" {
        working_dir "/Users/bartlomiejobrochta/projects/myapp/backend"
        execute "echo 'Starting server...'"
        execute "npm run dev"
        split "right"
    }

    pane "logs" {
        execute "tail -f logs/app.log"
        split "down"
    }
}
